<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div class='header'>Мы набираем работников для банк Маннру. <a class='outlinebtn' href="https://forms.gle/GJFTNofAoNCuxMT37">Подать заявку</a></div>
    <nav class="navbar">
        <div style="margin-left: auto;">
            <a href="index.html" class="nav-link" style="border: none; text-shadow: 0 0 0px;" onclick="animateClick(this)">Главная</a>
            <a href="market.html" class="nav-link" style="border: none; text-shadow: 0 0 0px;" onclick="animateClick(this)">Маркет</a>
            <a href="sitehistory.html" class="nav-link" style="border: none; text-shadow: 0 0 0px;" onclick="animateClick(this)">История сайта</a>
            <a href="contacts.html" class="nav-link" style="border: none; text-shadow: 0 0 0px;" onclick="animateClick(this)">Контакты</a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    </nav>
    <title>Настройки - Банк Маннру</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="setstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="settings-container">
        <div class="settings-section">
            <h2 class="general-text"><i class="fas fa-paint-brush"></i> Внешний вид</h2>
            <div class="setting-item">
                <label for="theme"><i class="fas fa-adjust"></i> Тема:</label>
                <select id="theme" onchange="changeTheme()">
                    <option value="default">По умолчанию</option>
                    <option value="dark">Темная</option>
                    <option value="light">Светлая</option>
                </select>
            </div>
            
            <h2 class="general-text"><i class="fas fa-language"></i> Язык</h2>
            <div class="setting-item">
                <label for="language"><i class="fas fa-globe"></i> Выберите язык:</label>
                <select id="language" onchange="changeLanguage()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <h2 class="general-text"><i class="fas fa-bell"></i> Уведомления</h2>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="notifications" onchange="toggleNotifications()">
                    <i class="fas fa-bell"></i> Включить уведомления
                </label>
            </div>
        </div>
    </div>

    <script src="settings.js"></script>
    <script>
        function changeTheme() {
            const theme = document.getElementById('theme').value;
            localStorage.setItem('theme', theme);
            applyTheme(theme);
        }

        function changeLanguage() {
            const language = document.getElementById('language').value;
            localStorage.setItem('language', language);
            // В реальном приложении здесь был бы код для изменения языка
        }

        function toggleNotifications() {
            const enabled = document.getElementById('notifications').checked;
            localStorage.setItem('notifications', enabled);
            if (enabled) {
                Notification.requestPermission();
            }
        }

        function applyTheme(theme) {
            // Set theme attribute on document root
            document.documentElement.setAttribute('data-theme', theme);

            // Apply CSS variables
            document.body.style.background = 'var(--bg-gradient)';
            
            // Apply styles to elements
            const elements = {
                '.header, .navbar': {
                    background: 'var(--nav-bg)',
                    color: 'var(--text-color)'
                },
                '.outlinebtn': {
                    color: 'var(--text-color)',
                    background: 'var(--button-bg)',
                    border: '1px solid var(--border-color)'
                },
                '.settings-section': {
                    background: 'var(--section-bg)',
                    color: 'var(--text-color)'
                },
                '.setting-item': {
                    background: 'var(--item-bg)',
                    color: 'var(--text-color)'
                },
                'label, .head, h1, h2': {
                    color: 'var(--text-color)'
                },
                '.nav-link': {
                    color: 'var(--nav-text-color)',
                    background: theme === 'dark' ? 'var(--nav-link-bg)' : (theme === 'light' ? 'var(--nav-link-bg)' : '')
                },
                'select': {
                    color: 'var(--text-color)',
                    background: 'var(--select-bg)',
                    border: '1px solid var(--border-color)'
                },
                'button': {
                    color: 'var(--text-color)',
                    background: 'var(--button-bg)',
                    border: '1px solid var(--border-color)'
                }
            };

            // Apply styles to all matching elements
            for (const [selector, styles] of Object.entries(elements)) {
                document.querySelectorAll(selector).forEach(element => {
                    Object.assign(element.style, styles);
                });
            }

            // Add hover effects
            const buttons = document.querySelectorAll('button, .outlinebtn');
            buttons.forEach(button => {
                button.addEventListener('mouseover', () => {
                    button.style.background = 'var(--button-hover)';
                });
                button.addEventListener('mouseout', () => {
                    button.style.background = 'var(--button-bg)';
                });
            });
        }

        function toggleMenu() {
            const menu = document.querySelector('.navbar div');
            menu.classList.toggle('show');
        }

        // Load saved settings on page load
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'default';
            const savedLanguage = localStorage.getItem('language');
            const savedNotifications = localStorage.getItem('notifications') === 'true';

            document.getElementById('theme').value = savedTheme;
            applyTheme(savedTheme);
            
            if (savedLanguage) {
                document.getElementById('language').value = savedLanguage;
            }
            document.getElementById('notifications').checked = savedNotifications;
        };

        // Function to animate click
        function animateClick(element) {
            element.classList.add('active');
            setTimeout(() => {
                element.classList.remove('active');
            }, 100);
        }
    </script>
</body>
</html>
