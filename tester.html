<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Салман Крокусов</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: linear-gradient(to bottom, rgba(35, 139, 139, 0.9), rgba(7, 89, 182, 0.9));
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 20px;
            text-align: center;
            width: 300px;
            color: white;
        }
        .card img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .card-text {
            font-size: 1.2em;
            margin: 0;
        }
        .balance {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.8);
        }
        .button {
            background: rgba(0, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .button:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="cardimg" src="Cards/SalmanCrocusov.png" alt="Салман Крокусов">
        <p class="card-text">Салман Крокусов</p>
        <p class="balance">Баланс: 0MP</p>
        <button class="button" onclick="checkPassword()">Войти</button>
    </div>

    <script>
        function checkPassword() {
            const password = prompt("Введите код безопасности:");
            if (password !== "695") {
                alert("Неправильный код!");
            } else {
                alert("Доступ предоставлен!");
            }
        }
    </script>
</body>
</html>
